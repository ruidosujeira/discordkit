name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: "CI (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Ruff check
        run: uv run --python ${{ matrix.python-version }} ruff check .

      - name: Ruff format check
        run: uv run --python ${{ matrix.python-version }} ruff format --check .

      - name: Mypy (strict)
        run: uv run --python ${{ matrix.python-version }} mypy src/discordkit

      - name: Pytest with coverage
        run: |
          uv run --python ${{ matrix.python-version }} \
            pytest \
            --cov=src/discordkit \
            --cov-report=term-missing \
            --cov-report=xml
